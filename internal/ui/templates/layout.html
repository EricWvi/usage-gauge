{{define "layout"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>usage-gauge</title>
  <script>
    // Apply the saved theme before first paint to avoid a flash of the wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">usage-gauge</span>
      </div>
      <div class="header-right">
        <span class="last-updated">Last updated: <span id="last-updated">{{.LastUpdatedText}}</span></span>
        <button class="theme-toggle" type="button" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
          <span class="icon-sun">☀</span>
          <span class="icon-moon">☾</span>
        </button>
      </div>
    </div>
  </header>
  <main id="cards" class="cards">
    {{template "cards" .}}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>{{end}}
